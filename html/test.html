<html lang="en">
<head>
    <title> jsCipherSuite Testing </title>
    <script src="./js/jsWorld.js"></script>
    <style>
        td {
            width: 200px;
        }
        #vv {
            width: 800px;
            height: 8em;
        }
    </style>
</head>
<body>
<label for="v"> Value </label><input id="v" maxlength="128"/>
<button id="t0"> ...T0... </button>
<button id="t1"> ...T1... </button>
<button id="t2"> ...T2... </button>
<button id="t3"> ...T3... </button>

<p>
    <label for='vv'></label><textarea id='vv'></textarea><br/>
    <button onclick="foobar()">foobar</button>
    <label for='c1'></label><input type="checkbox" id='c1' checked> zHASH_v
    <label for='c2'></label><input type="checkbox" id='c2' checked> rLANG_v
    <label for='c3'></label><input type="checkbox" id='c3' checked> rLANG_s
    <label for='c4'></label><input type="checkbox" id='c4' checked> vDATE_t
    <div id='el'></div>
</p>

<script>
    async function Sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function T0(bindings, TEXT) {
        console.info(`WorldSeed ${bindings.WorldSeed_().toString('base64')}`);
        console.log(`RandBytes ${bindings.RandBytes(10).toString('base64')}`);

        console.log(`${bindings.Version().toString(16).toUpperCase()} RandBytes(32) ${bindings.RandBytes(32).toString('hex')}`);
        for(let md of [ "SHA1", "SHA256", "SHA384", "SHA512"]) {
            const digest = bindings.Digest(md).Init().Update(TEXT).Final();
            console.info(`${('   ' + md).slice(-6)}(TEXT-${TEXT.length}) : ${digest.toString('hex').toUpperCase()}`);
        }

        await (async function() {
            const assert = (condition) => {
                if(!condition) {
                    let err = new Error('Assert failed!');
                    console.error(`Error ${err} ${err.stack}`);
                    throw err;
                }
            };

            const ticks = [];
            for(let i = 0; i < 100; ++i) {
                const start = Date.now();
                let alice = bindings.X25519().GenerateKey(), bob = bindings.X25519().GenerateKey();
                let sec1 = alice.X25519(bob);
                let sec2 = bob.X25519(alice);
                assert(Buffer.compare(sec1, sec2) === 0);

                let cipher = bindings.RandBytes(32), pubk = bindings.RandBytes(32);
                let x1 = bindings.X25519().SetPrivateKey(cipher), x2 = bindings.X25519().SetPrivateKey(cipher);
                let c1 = x1.X25519(pubk), c2 = x2.X25519(pubk);

                assert(Buffer.compare(x1.GetPublicKey(), x2.GetPublicKey()) === 0);
                assert(Buffer.compare(c1, c2) === 0);

                let e1 = bindings.Ed25519().SetPrivateKey(cipher), e2 = bindings.Ed25519().SetPrivateKey(cipher);
                assert(Buffer.compare(e1.GetPublicKey(), e2.GetPublicKey()) === 0);

                let message = bindings.RandBytes(128);

                let s1 = e1.Sign(message), s2 = e2.Sign(message);
                assert(Buffer.compare(s1, s2) === 0);

                assert(e1.Verify(message, s1));
                assert(bindings.Ed25519().SetPublicKey(e1.GetPublicKey()).Verify(message, s1));

                pubk = e1.GetPublicKey();
                e1.SetPublicKey(pubk);

                s1[5] ^= 1;
                assert(!e1.Verify(message, s1));
                s1[5] ^= 1;
                assert(e1.Verify(message, s1));

                pubk[5] ^= 1;
                e1.SetPublicKey(pubk);
                try {
                    let r = e1.Verify(message, s1);
                    assert(!r);
                }catch(e) {}

                pubk[5] ^= 1;
                e1.SetPublicKey(pubk);
                assert(e1.Verify(message, s1));

                pubk[31] ^= 1;
                e1.SetPublicKey(pubk);

                try {
                    let r = e1.Verify(message, s1);
                    assert(!r);
                }
                catch(e) {
                }

                ticks.push(Date.now() - start);
            }

            console.log(`Check .... 1 .... ${JSON.stringify(ticks)}`);
            ticks.length = 0; await Sleep(10);

            {
                const cipher = bindings.X25519().GenerateKey() , nonce = bindings.RandBytes(12), aad = bindings.RandBytes(Math.random() * 16 | 0);
                const [ aead, pubkey ] = bindings.XChaChaPoly(cipher.GetPublicKey());
                const checkInput = bindings.RandBytes(300*1024);

                {
                    const [ aead2 ] = bindings.XChaChaPoly(pubkey, cipher);
                    const cccc = aead.Seal(checkInput, nonce, aad);
                    const text = aead2.Open(cccc, nonce, aad);
                    assert(Buffer.compare(checkInput, text) === 0 && checkInput.length === cccc.length - 16);
                }

                for(let i = 0; i < 100; ++i) {
                    const TICK = Date.now();
                    const message = checkInput;

                    message.writeInt32LE(Date.now() | 0, 0);

                    const cipher = aead.Seal(message, nonce, aad);
                    const text = aead.Open(cipher, nonce, aad);

                    assert(Buffer.compare(text, message) === 0 && cipher.length === message.length + 16);
                    ticks.push(Date.now() - TICK);
                }
            }
            console.log(`Check .... 2 .... ${JSON.stringify(ticks)}`);
            ticks.length = 0; await Sleep(10);
            bindings.SeedBytes(bindings, Buffer.from('11231231231231'));

            console.log('Check .... 3 .... ok');
            bindings.SeedBytes(bindings);

            const gzHello = 'eNrzSM3JyVcozy/KSVEEAB0JBF4=';
            let hello = bindings.Gunzip(Buffer.from(gzHello, 'base64'), -1);
            assert(hello.toString() === 'Hello world!');

            assert(bindings.Gunzip(Buffer.from(gzHello, 'base64'), 12).toString() === "Hello world!");

            {
                let except = 0;
                try {
                    bindings.Gunzip(Buffer.from(gzHello, 'base64'), 11);
                }
                catch(e) {
                    except = 1;
                }
                assert(1 === except);
            }

            console.log('Check .... 4');
        })();
    }

    async function T1(bindings) {
      for(let loop = 0; loop < 10; ++loop) {
        const kSize = 1 << 20;
        const key = bindings.RandBytes(32), nonce = bindings.RandBytes(12);
        const input = bindings.RandBytes(kSize), check = Buffer.alloc(kSize);

        const aead = bindings.ChaChaPoly(key).Seal(input, nonce);
        const state = Buffer.alloc(64);

        state.writeInt32LE(0x61707865, 0);
        state.writeInt32LE(0x3320646e, 4);
        state.writeInt32LE(0x79622d32, 8);
        state.writeInt32LE(0x6b206574, 12);
        nonce.copy(state, 64 - 12);
        key.copy(state, 16);

        bindings.ChaCha20(state, (stream, index)=>{
          if(--index < 0)
            return true; /* poly1305-key */
          const offset = index << 6;
          for(let i = 0; i < 64; ++i)
            check[offset + i] = input[offset + i] ^ stream[i];
          return offset < kSize;
        });

        const result = aead.subarray(0, kSize).compare(check);
        console.log(`ChaCha20 Test ${loop} => ${result}`);
        await Sleep(10);
      }
    }

    jsWorld.CipherLoader().then(async jsCipher => {
        window.jsCipher = jsCipher;
        window.Buffer = jsCipher.Buffer_();

        document.getElementById('t0').addEventListener('click', async ()=>{
            await T0(jsCipher, Buffer.from(document.getElementById('v').value))
        });

        document.getElementById('t1').addEventListener('click', async ()=>{
            await T1(jsCipher);
        });

        document.getElementById('t3').addEventListener('click', async ()=>{
            for(let loop = 1;; ++loop) {
                const Annihilus = jsCipher.Annihilus_(42);
                console.warn(`${loop} ${Annihilus.stack}`);
                if(isNaN(Annihilus.Perfect()))
                    break;
            }
        });



    });

</script>

<script>
        const re_magic = /^[a-z0-9@$]{5}$/i;
        const re_value = /^(0x)?([a-f0-9]{1,8})$/i;
        const re_date  = /^([1-9][0-9]{3})-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[01])T([0-5][0-9]):([0-5][0-9]):([0-5][0-9])Z$/;
        const re_name  = /([a-z0-9@$#.\-_:]+)/ig;

        function rLANG_DECLARE_MAGIC_X(a0, a1, a2, a3, a4) {
            let v = ((((0x3F & (a0))) << 26) | ((0x3F & (a1)) << 20) | ((0x3F & (a2)) << 14) | ((0x3F & (a3)) << 8) | ((0x3F & (a4)) << 2) | 3);
            if(v < 0)
                v += 0x100000000;
            return v;
        }

        function rLANG_DECLARE_MAGIC_Vc(cc) {
            cc = 0x40 | (cc & 0x3F);

            switch (cc) {
            case 0x5B:
            case 0x5C:
            case 0x5D:
            case 0x5E:
            case 0x5F:
                cc = 0x31 - 0x5B + cc;
                break;

            case 0x60:
                cc = 0x30;
                break;

            case 0x7B:
            case 0x7C:
            case 0x7D:
            case 0x7E:
                cc = 0x36 - 0x7B + cc;
                break;

            case 0x7F:
                cc = 0x24;
                break;
            }

            return cc;
        }

        function rLANG_DECLARE_MAGIC_Xc(cc) {
            if ((cc >= 0x40 && cc <= 0x5A) || (cc >= 0x61 && cc <= 0x7A)) {
                cc &= 0x3F;
            }
            else {
                switch (cc) {
                case 0x30:
                    cc = 0x20;
                    break;

                case 0x31:
                case 0x32:
                case 0x33:
                case 0x34:
                case 0x35:
                    cc = 0x1B - 0x31 + cc;
                    break;

                case 0x36:
                case 0x37:
                case 0x38:
                case 0x39:
                    cc = 0x3B - 0x36 + cc;
                    break;

                default:
                    cc = 0x3F;
                    break;
                }
            }

            return cc;
        }

        function rLANG_DECLARE_MAGIC_Xs(s) {
            if(!(s instanceof Buffer))
                s = Buffer.from(s);

            return rLANG_DECLARE_MAGIC_X(
                rLANG_DECLARE_MAGIC_Xc(s[0]),
                rLANG_DECLARE_MAGIC_Xc(s[1]),
                rLANG_DECLARE_MAGIC_Xc(s[2]),
                rLANG_DECLARE_MAGIC_Xc(s[3]),
                rLANG_DECLARE_MAGIC_Xc(s[4]));
        }

        function rLANG_DECLARE_MAGIC_Vs(magic) {
            let buffer = [];
            for(let i = 0; i < 5; ++i)
                buffer.push(rLANG_DECLARE_MAGIC_Vc(magic >> (26 - 6 * i)));
            return Buffer.from(buffer).toString();
        }

        function rLANG_CALCHASH_Xs(s) {
            let v = new Uint32Array([0]);
            if(!(s instanceof Buffer))
                s = Buffer.from(s);
            for(let cc of s)
                v[0] = 0x3001 * v[0] + cc;
            return (v[0] ^ s.length) & 0x7fffffff;
        }

        const date2020 = Date.UTC(2020, 0, 1);
        function rLANG_DATE_V(yy, mm, dd, HH, MM, SS) {
            mm -= 1;

            const value = Date.UTC(yy, mm, dd, HH, MM, SS), date = new Date(value);
            if(date.getUTCFullYear() === yy && date.getUTCMonth() === mm && date.getUTCDate() === dd)
                return (value - date2020) / 1000;
            return void 0;
        }

        function foobar() {
            let val = document.getElementById('vv').value, list = [], mp = new Set(), result;

            const c1_checked = document.getElementById('c1').checked;
            const c2_checked = document.getElementById('c2').checked;
            const c3_checked = document.getElementById('c3').checked;
            const c4_checked = document.getElementById('c4').checked;

            el.innerHTML = '';
            while((result = re_name.exec(val)) !== null) {
                let v = result[1], m;
                if(mp.has(v))
                    continue;
                mp.add(v);

                if(c1_checked) {
                    list.push([
                        'zHASH_v', v, `0x${('00000000' + rLANG_CALCHASH_Xs(v).toString(16).toUpperCase()).slice(-8)}`
                    ]);
                }

                if(c2_checked && (m = v.match(re_value))) {
                    list.push([
                        'rLANG_v', v, rLANG_DECLARE_MAGIC_Vs(parseInt(m[2], 16))
                    ]);
                }

                if(c3_checked && v.match(re_magic)) {
                    list.push([
                        'rLANG_s', v, `0x${('00000000' + rLANG_DECLARE_MAGIC_Xs(v).toString(16).toUpperCase()).slice(-8)}`
                    ]);
                }

                if(c4_checked && (m = v.match(re_date))) {
                    const date = rLANG_DATE_V(m[1]|0, m[2]|0, m[3]|0, m[4]|0, m[5]|0, m[6]|0);
                    if(typeof date === 'number') {
                        list.push([
                            'vDATE_t', v, date
                        ]);
                    }
                }
            }

            if(!list.length)
                return;

            list = list.sort((a, b)=> {
                let x = a[0], y = b[0];

                if(x === y) {
                    x = a[1];
                    y = b[1];
                }

                return x < y ? -1 : 1;
            })

            let table = document.createElement('table');
            let tbody = document.createElement('tbody');
            table.setAttribute('border', '2');

            for(let item of list) {
                let tr = document.createElement('tr');
                for(let i = 0; i < 3; ++i) {
                    let td = document.createElement('td');
                    td.appendChild(document.createTextNode(item[i]));
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
            table.appendChild(tbody);
            document.getElementById('el').appendChild(table);
        }
    </script>

</body>
